---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: home-operations-runner
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-home-operations
  target:
    name: home-operations-runner-secret
    template:
      data:
        github_app_id: "{{ .ACTION_RUNNER_APP_ID }}"
        github_app_installation_id: "{{ .ACTION_RUNNER_INSTALLATION_ID }}"
        github_app_private_key: "{{ .ACTION_RUNNER_PRIVATE_KEY }}"
  dataFrom:
    - extract:
        key: actions-runner
