---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kopia
spec:
  components:
    - ../../../../components/hpa
  dependsOn:
    - name: volsync
  interval: 1h
  path: ./kubernetes/apps/volsync-system/kopia/app
  postBuild:
    substitute:
      APP: kopia
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: volsync-system
