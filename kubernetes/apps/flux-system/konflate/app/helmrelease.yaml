---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
spec:
  chartRef:
    kind: OCIRepository
    name: konflate
  interval: 1h
  values:
    config:
      clusterPath: ./kubernetes/flux/cluster
      refreshInterval: "0"
      repo: github://buroa/k8s-gitops
      prComments: true
      publicUrl: https://{{ .Release.Name }}.k13.dev
      statusChecks: true
    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/endpoint: |-
          conditions: ["[STATUS] == 200"]
      hostnames:
        - "{{ .Release.Name }}.k13.dev"
      parentRefs:
        - name: envoy-external
          namespace: networking
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 50m
      limits:
        memory: 1Gi
    secret:
      existingSecret: konflate-secret
