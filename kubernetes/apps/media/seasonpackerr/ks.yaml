---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: seasonpackerr
spec:
  components:
    # - ../../../../components/scaler
  interval: 1h
  path: ./kubernetes/apps/media/seasonpackerr/app
  postBuild:
    substitute:
      APP: seasonpackerr
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
