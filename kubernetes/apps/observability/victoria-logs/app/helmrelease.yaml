---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app victoria-logs
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs
  interval: 1h
  values:
    global:
      image:
        registry: quay.io
    dashboards:
      enabled: true
      grafanaOperator:
        enabled: true
    server:
      fullnameOverride: *app
      persistentVolume:
        enabled: true
        storageClassName: ceph-block
        size: 50Gi
      retentionPeriod: 90d
      route:
        enabled: true
        hostnames:
          - vlogs.k13.dev
        parentRefs:
          - name: envoy-internal
            namespace: networking
      serviceMonitor:
        enabled: true
    vector:
      enabled: false
