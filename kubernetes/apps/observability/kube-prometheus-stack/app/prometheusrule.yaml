---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kube-prometheus-stack-additional
spec:
  groups:
    - name: dockerhub.rules
      rules:
        - alert: DockerhubRateLimitRisk
          expr: |-
            count(time() - container_last_seen{image=~"(docker.io).*",container!=""} < 30) > 100
          annotations:
            summary: >-
              There are {{ $value }} containers pulling from Dockerhub. This may lead to rate limiting.
          labels:
            severity: critical
    - name: oom.rules
      rules:
        - alert: OomKilled
          expr: |-
            (kube_pod_container_status_restarts_total - kube_pod_container_status_restarts_total offset 10m >= 1) and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) == 1
          annotations:
            summary: >-
              Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled {{ $value }} times in the last 10 minutes.
          labels:
            severity: critical
    - name: zfs.rules
      rules:
        - alert: ZfsUnexpectedPoolState
          expr: |-
            node_zfs_zpool_state{state!="online"} > 0
          annotations:
            summary: >-
              ZFS pool {{ $labels.zpool }} is {{ $labels.state }} on instance {{ $labels.instance }}
          labels:
            severity: critical
