---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: ${APP}
spec:
  copyMethod: Snapshot
  credentialProjection:
    enabled: true
  repository:
    kind: ClusterRepository
    name: nas
  retention:
    keepDaily: 7
    keepHourly: 24
  sources:
    - pvc:
        name: ${APP}
  # verification:
  #   deep:
  #     schedule:
  #       cron: 0 5 * * 0
  #       jitter: 1h
  #   quick:
  #     cron: 0 5 * * *
  #     jitter: 30m
  #   successExpr: stats.files > 0 && stats.errors == 0
  #   verifyFilesPercent: 10
  volumeSnapshotClassName: ${KOPIUR_SNAPSHOTCLASS:=csi-ceph-block}
