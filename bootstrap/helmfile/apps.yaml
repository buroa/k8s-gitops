---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

# Bootstraps core applications that provide a minimal runtime base for the
# cluster. These releases are installed first so the cluster has the resources
# Flux needs before its own reconciliation begins.
#
# After this bootstrap phase, Flux is ready to take over management of the
# application stack and continue reconciling downstream state.

bases:
  - default.yaml

defaultInherit: default

helmDefaults:
  cleanupOnFail: true
  forceConflicts: true
  wait: true
  waitForJobs: true

releases:
  - name: cilium
    namespace: kube-system
    hooks:
      - # Advertise Kubernetes VIP
        command: kubectl
        args:
          - apply
          - --field-manager=kustomize-controller
          - --namespace={{ .Release.Namespace }}
          - --kustomize=../../kubernetes/apps/{{ .Release.Namespace }}/{{ .Release.Name }}/config
          - --server-side
        events:
          - postsync
        showlogs: true

  - name: coredns
    namespace: kube-system
    needs:
      - kube-system/cilium

  - name: spegel
    namespace: kube-system
    needs:
      - kube-system/coredns

  - name: cert-manager
    namespace: cert-manager
    needs:
      - kube-system/spegel

  - name: external-secrets
    namespace: external-secrets
    needs:
      - cert-manager/cert-manager

  - name: onepassword-connect
    namespace: external-secrets
    hooks:
      - # Apply 1Password Connect Store
        command: kubectl
        args:
          - apply
          - --field-manager=kustomize-controller
          - --namespace={{ .Release.Namespace }}
          - --kustomize=../../kubernetes/apps/{{ .Release.Namespace }}/{{ .Release.Name }}/store
          - --server-side
        events:
          - postsync
        showlogs: true
    needs:
      - external-secrets/external-secrets

  - name: flux-operator
    namespace: flux-system
    needs:
      - external-secrets/onepassword-connect

  - name: flux-instance
    namespace: flux-system
    needs:
      - flux-system/flux-operator
