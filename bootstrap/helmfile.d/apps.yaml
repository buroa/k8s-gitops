---
# Bootstraps core applications that provide a minimal runtime base for the
# cluster. These releases are installed first so the cluster has the resources
# Flux needs before its own reconciliation begins.
#
# After this bootstrap phase, Flux is ready to take over management of the
# application stack and continue reconciling downstream state.

helmDefaults:
  args: ['--force-conflicts']
  cleanupOnFail: true
  wait: true
  waitForJobs: true

releases:
  - name: cilium
    namespace: kube-system
    chart: oci://quay.io/cilium/charts/cilium
    version: 1.19.4
    values: ['./templates/values.yaml.gotmpl']
    hooks:
      - # Advertise Kubernetes VIP
        events: ['postsync']
        command: kubectl
        args:
          - apply
          - --field-manager=kustomize-controller
          - --namespace={{ .Release.Namespace }}
          - --kustomize=../../kubernetes/apps/{{ .Release.Namespace }}/{{ .Release.Name }}/config
          - --server-side
        showlogs: true

  - name: coredns
    namespace: kube-system
    chart: oci://ghcr.io/coredns/charts/coredns
    version: 1.45.2
    values: ['./templates/values.yaml.gotmpl']
    needs: ['kube-system/cilium']

  - name: spegel
    namespace: kube-system
    chart: oci://ghcr.io/spegel-org/helm-charts/spegel
    version: 0.7.0
    values: ['./templates/values.yaml.gotmpl']
    needs: ['kube-system/coredns']

  - name: cert-manager
    namespace: cert-manager
    chart: oci://quay.io/jetstack/charts/cert-manager
    version: v1.20.2
    values: ['./templates/values.yaml.gotmpl']
    needs: ['kube-system/spegel']

  - name: external-secrets
    namespace: external-secrets
    chart: oci://ghcr.io/external-secrets/charts/external-secrets
    version: 2.4.1
    values: ['./templates/values.yaml.gotmpl']
    needs: ['cert-manager/cert-manager']

  - name: onepassword-connect
    namespace: external-secrets
    chart: oci://ghcr.io/1password/connect
    version: 2.4.1
    values: ['./templates/values.yaml.gotmpl']
    needs: ['external-secrets/external-secrets']
    hooks:
      - # Apply 1Password Connect Store
        events: ['postsync']
        command: kubectl
        args:
          - apply
          - --field-manager=kustomize-controller
          - --namespace={{ .Release.Namespace }}
          - --kustomize=../../kubernetes/apps/{{ .Release.Namespace }}/{{ .Release.Name }}/store
          - --server-side
        showlogs: true

  - name: flux-operator
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.49.0
    values: ['./templates/values.yaml.gotmpl']
    needs: ['external-secrets/onepassword-connect']

  - name: flux-instance
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
    version: 0.49.0
    values: ['./templates/values.yaml.gotmpl']
    needs: ['flux-system/flux-operator']
