---
name: Image Pull

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  filter:
    name: Image Pull - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: kubernetes/**/*

  extract:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Image Pull - Extract Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch:
          - default
          - pull
      fail-fast: false
    outputs:
      default: ${{ steps.extract.outputs.default }}
      pull: ${{ steps.extract.outputs.pull }}
    steps:
      - name: Scope
        id: scope
        env:
          CHANGED: ${{ needs.filter.outputs.changed-files }}
        run: |
          set -euo pipefail
          apps="$(jq -r '.[] | capture("^kubernetes/apps/(?<ns>[^/]+)/(?<app>[^/]+)/")? | "\(.ns)/\(.app)"' <<< "$CHANGED" | sort -u)"
          {
            echo "kubernetes/flux"
            echo "kubernetes/components"
            jq -r '.[]' <<< "$CHANGED"
            awk -F/ '{print "kubernetes/apps/"$1"/kustomization.yaml\nkubernetes/apps/"$1"/"$2}' <<< "$apps"
          } | awk 'NF' | sort -u > sparse.txt
          { echo "sparse<<EOF"; cat sparse.txt; echo "EOF"; } >> "$GITHUB_OUTPUT"
          { echo "apps<<EOF"; echo "$apps"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ matrix.branch == 'default' && github.event.repository.default_branch || '' }}
          sparse-checkout-cone-mode: false
          sparse-checkout: ${{ steps.scope.outputs.sparse }}

      - name: Rewrite app kustomizations
        env:
          APPS: ${{ steps.scope.outputs.apps }}
        run: |
          set -euo pipefail
          for ns in $(awk -F/ '{print $1}' <<< "$APPS" | sort -u); do
            [ -n "$ns" ] || continue
            {
              echo "---"
              echo "apiVersion: kustomize.config.k8s.io/v1beta1"
              echo "kind: Kustomization"
              echo "namespace: $ns"
              echo "components:"
              echo "  - ../../components/namespace"
              echo "resources:"
              awk -F/ -v ns="$ns" '$1==ns{print "  - ./"$2"/ks.yaml"}' <<< "$APPS" | sort -u
            } > "kubernetes/apps/$ns/kustomization.yaml"
          done

      - name: Gather Images
        uses: docker://ghcr.io/allenporter/flux-local:v8.1.0
        with:
          args: >-
            get cluster
            --all-namespaces
            --path /github/workspace/kubernetes/flux/cluster
            --enable-images
            --only-images
            --output json
            --output-file images.json

      - name: Extract Images
        id: extract
        run: echo "${{ matrix.branch }}=$(jq --compact-output '.' images.json)" >> $GITHUB_OUTPUT

  diff:
    if: ${{ needs.extract.outputs.default != needs.extract.outputs.pull }}
    needs: extract
    name: Image Pull - Diff Images
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.diff.outputs.images }}
    steps:
      - name: Diff Images
        id: diff
        run: |-
          images=$(jq --compact-output --null-input \
              --argjson f1 '${{ needs.extract.outputs.default }}' \
              --argjson f2 '${{ needs.extract.outputs.pull }}' \
              '$f2 - $f1' \
          )
          echo "images=${images}" >> $GITHUB_OUTPUT

  pull:
    if: ${{ needs.diff.outputs.images != '[]' }}
    needs: diff
    name: Image Pull - Pull Images
    runs-on: k8s-gitops-runner
    strategy:
      matrix:
        image: ${{ fromJSON(needs.diff.outputs.images) }}
      max-parallel: 4
      fail-fast: false
    steps:
      - name: Install talosctl
        run: curl -fsSL https://talos.dev/install | sh

      - name: Pull Image
        run: talosctl --nodes $NODE image pull ${{ matrix.image }}

  success:
    if: ${{ !cancelled() }}
    needs: pull
    name: Image Pull - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
