---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Image Pull

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    name: Image Pull - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: kubernetes/**/*

  flate:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Image Pull - Flate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      images: ${{ steps.flate.outputs.images }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          cache: false
          tool_versions: |
            github:home-operations/flate latest

      - name: Run Flate
        id: flate
        run: |
          echo 'images<<EOF' >> $GITHUB_OUTPUT
          flate diff images -p ./kubernetes/flux/cluster -o json >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

  pull:
    if: ${{ needs.flate.outputs.images != '[]' }}
    needs: flate
    name: Image Pull - Pull Images
    runs-on: k8s-gitops-runner
    strategy:
      matrix:
        image: ${{ fromJSON(needs.flate.outputs.images) }}
      max-parallel: 4
      fail-fast: false
    steps:
      - name: Setup Mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          cache: false
          tool_versions: |
            talosctl latest

      - name: Pull Image
        env:
          IMAGE: ${{ matrix.image }}
        run: talosctl --nodes $NODE image pull $IMAGE

  success:
    if: ${{ !cancelled() }}
    needs: [flate, pull]
    name: Image Pull - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
