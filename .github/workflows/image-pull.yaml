---
name: Image Pull

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

env:
  NEWLINE: |

jobs:
  filter:
    name: Image Pull - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: kubernetes/apps/**/*
          include_only_directories: true
          max_depth: 4

  extract:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Image Pull - Extract Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch:
          - default
          - pull
      fail-fast: false
    outputs:
      default: ${{ steps.extract.outputs.default }}
      pull: ${{ steps.extract.outputs.pull }}
    steps:
      - name: Prepare Sparse Checkout And Namespace Apps
        id: prepare
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        env:
          CHANGED_FILES: ${{ needs.filter.outputs.changed-files }}
        with:
          script: |
            const changed = JSON.parse(process.env.CHANGED_FILES || "[]");

            const namespaceApps = new Map();
            for (const raw of changed) {
              const p = String(raw).replace(/^\.?\//, "");
              if (!p.startsWith("kubernetes/apps/")) continue;

              const parts = p.split("/");
              // kubernetes/apps/<namespace>/<app>/...
              if (parts.length < 4) continue;

              const namespace = parts[2];
              const app = parts[3];
              if (!namespace || !app || app === "kustomization.yaml") continue;

              if (!namespaceApps.has(namespace)) namespaceApps.set(namespace, new Set());
              namespaceApps.get(namespace).add(app);
            }

            const sparsePaths = new Set([
              "kubernetes/components",
              "kubernetes/flux",
            ]);

            for (const [namespace, apps] of namespaceApps.entries()) {
              sparsePaths.add(`kubernetes/apps/${namespace}/kustomization.yaml`);
              for (const app of apps) {
                sparsePaths.add(`kubernetes/apps/${namespace}/${app}`);
              }
            }

            const namespaceAppsObj = Object.fromEntries(
              [...namespaceApps.entries()]
                .sort(([a], [b]) => a.localeCompare(b))
                .map(([ns, apps]) => [ns, [...apps].sort()])
            );

            core.setOutput("sparse-checkout", [...sparsePaths].sort().join("\n"));
            core.setOutput("namespace-apps", JSON.stringify(namespaceAppsObj));

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ matrix.branch == 'default' && github.event.repository.default_branch || '' }}
          sparse-checkout: ${{ steps.prepare.outputs.sparse-checkout }}
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@v3.8.0
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install -g js-yaml

      - name: Rewrite Namespace Kustomizations
        env:
          NAMESPACE_APPS: ${{ steps.prepare.outputs.namespace-apps }}
        run: |
          set -euo pipefail

          jq -r 'keys[]' <<< "${NAMESPACE_APPS}" | while read -r namespace; do
            kustomization_path="kubernetes/apps/${namespace}/kustomization.yaml"

            if [[ ! -f "${kustomization_path}" ]]; then
              echo "WARN: Missing ${kustomization_path}, skipping"
              continue
            fi

            apps_json="$(jq -c --arg ns "${namespace}" '.[$ns]' <<< "${NAMESPACE_APPS}")"
            export APPS_JSON="${apps_json}"

            yq --inplace '
              .resources = (
                strenv(APPS_JSON)
                | fromjson
                | map("./" + . + "/ks.yaml")
              )
            ' "${kustomization_path}"

            echo "Updated ${kustomization_path}"
          done

      - name: Gather Images
        uses: docker://ghcr.io/allenporter/flux-local:v8.1.0
        with:
          args: >-
            get cluster
            --all-namespaces
            --path ./kubernetes/flux/cluster
            --enable-images
            --only-images
            --output json
            --output-file images.json

      - name: Extract Images
        id: extract
        run: echo "${{ matrix.branch }}=$(jq --compact-output '.' images.json)" >> $GITHUB_OUTPUT

  diff:
    if: ${{ needs.extract.outputs.default != needs.extract.outputs.pull }}
    needs: extract
    name: Image Pull - Diff Images
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.diff.outputs.images }}
    steps:
      - name: Diff Images
        id: diff
        run: |-
          images=$(jq --compact-output --null-input \
              --argjson f1 '${{ needs.extract.outputs.default }}' \
              --argjson f2 '${{ needs.extract.outputs.pull }}' \
              '$f2 - $f1' \
          )
          echo "images=${images}" >> $GITHUB_OUTPUT

  pull:
    if: ${{ needs.diff.outputs.images != '[]' }}
    needs: diff
    name: Image Pull - Pull Images
    runs-on: k8s-gitops-runner
    strategy:
      matrix:
        image: ${{ fromJSON(needs.diff.outputs.images) }}
      max-parallel: 4
      fail-fast: false
    steps:
      - name: Install talosctl
        run: curl -fsSL https://talos.dev/install | sh

      - name: Pull Image
        run: talosctl --nodes $NODE image pull ${{ matrix.image }}

  success:
    if: ${{ !cancelled() }}
    needs: pull
    name: Image Pull - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
